<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dynamic Quote Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
    }

    button {
      margin: 5px 0;
      padding: 6px 12px;
      cursor: pointer;
    }

    select,
    input {
      padding: 5px;
      margin: 5px 0;
    }

    #notification {
      color: green;
      margin: 10px 0;
      font-weight: bold;
    }

    .quote-card {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>Dynamic Quote Generator</h1>

  <!-- Notification -->
  <div id="notification"></div>

  <!-- Category Filter -->
  <select id="categoryFilter">
    <option value="all">All Categories</option>
  </select>

  <button id="newQuote">Show Random Quote</button>
  <button id="manualSync">Sync Now</button>

  <!-- Quote Display -->
  <div id="quoteDisplay"></div>

  <hr>

  <h3>Add New Quote</h3>
  <div>
    <input id="newQuoteText" type="text" placeholder="Enter quote text">
    <input id="newQuoteCategory" type="text" placeholder="Enter category">
    <button id="addQuoteBtn">Add Quote</button>
  </div>

  <hr>

  <h3>Import / Export</h3>
  <button id="exportBtn">Export Quotes (JSON)</button>
  <input type="file" id="importFile" accept=".json">

  <script src="script.js"></script>
</body>

</html>
